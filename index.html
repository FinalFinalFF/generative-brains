<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Brains — Synaptic Tessellation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Anthropic Brand Colors */
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Control Sections */
        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        /* Seed Controls */
        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        /* Parameter Controls */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        /* Color Pickers */
        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        /* Buttons */
        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: auto !important;
            height: auto !important;
            max-width: 100%;
            max-height: calc(100vh - 40px);
            margin: 0 auto;
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        /* Responsive - Stack on mobile */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Control Sidebar -->
        <div class="sidebar">
            <h1>Generative Brains</h1>
            <div class="subtitle">Synaptic Tessellation — grid-blob pattern generator. Cells fuse into neural clusters; the gaps are where the signal happens.</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Columns</label>
                    <div class="slider-container">
                        <input type="range" id="cols" min="4" max="28" step="1" value="14" oninput="updateParam('cols', this.value)">
                        <span class="value-display" id="cols-value">14</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Rows</label>
                    <div class="slider-container">
                        <input type="range" id="rows" min="3" max="20" step="1" value="9" oninput="updateParam('rows', this.value)">
                        <span class="value-display" id="rows-value">9</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Density</label>
                    <div class="slider-container">
                        <input type="range" id="density" min="0.3" max="0.98" step="0.01" value="0.72" oninput="updateParam('density', this.value)">
                        <span class="value-display" id="density-value">0.72</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Blob Size</label>
                    <div class="slider-container">
                        <input type="range" id="blobSize" min="2" max="16" step="1" value="8" oninput="updateParam('blobSize', this.value)">
                        <span class="value-display" id="blobSize-value">8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Snakiness</label>
                    <div class="slider-container">
                        <input type="range" id="snakiness" min="0" max="1" step="0.05" value="0.65" oninput="updateParam('snakiness', this.value)">
                        <span class="value-display" id="snakiness-value">0.65</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Diagonals</label>
                    <div class="slider-container">
                        <input type="range" id="diagonal" min="0" max="1" step="0.05" value="0.3" oninput="updateParam('diagonal', this.value)">
                        <span class="value-display" id="diagonal-value">0.30</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Neck Width</label>
                    <div class="slider-container">
                        <input type="range" id="neckWidth" min="0.1" max="0.8" step="0.05" value="0.35" oninput="updateParam('neckWidth', this.value)">
                        <span class="value-display" id="neckWidth-value">0.35</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Gap</label>
                    <div class="slider-container">
                        <input type="range" id="gap" min="0" max="0.3" step="0.01" value="0.12" oninput="updateParam('gap', this.value)">
                        <span class="value-display" id="gap-value">0.12</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Roundness</label>
                    <div class="slider-container">
                        <input type="range" id="roundness" min="0" max="1" step="0.05" value="1" oninput="updateParam('roundness', this.value)">
                        <span class="value-display" id="roundness-value">1.00</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Fillet Depth</label>
                    <div class="slider-container">
                        <input type="range" id="filletDepth" min="0" max="1" step="0.05" value="1" oninput="updateParam('filletDepth', this.value)">
                        <span class="value-display" id="filletDepth-value">1.00</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Ink</label>
                    <div class="color-picker-container">
                        <input type="color" id="inkColor" value="#000000" onchange="updateColor('inkColor', this.value)">
                        <span class="color-value" id="inkColor-value">#000000</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Paper</label>
                    <div class="color-picker-container">
                        <input type="color" id="paperColor" value="#ffffff" onchange="updateColor('paperColor', this.value)">
                        <span class="color-value" id="paperColor-value">#ffffff</span>
                    </div>
                </div>

                <button class="button secondary" onclick="swapColors()">⇄ Swap Ink / Paper</button>
            </div>

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="downloadPNG()">Download PNG</button>
                </div>
                <div class="button-row">
                    <button class="button tertiary" onclick="initializeSystem()">Regenerate</button>
                    <button class="button secondary" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <!-- Main Canvas Area -->
        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // SYNAPTIC TESSELLATION — PARAMETERS
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 12345,
            cols: 14,
            rows: 9,
            density: 0.72,       // target fraction of cells occupied by blobs
            blobSize: 8,         // max cells per blob (sizes are uniform 1..blobSize)
            snakiness: 0.65,     // growth from the walk tip (snaky) vs anywhere on the blob (clumpy)
            diagonal: 0.3,       // probability of a growth step moving diagonally (skinny neck fusion)
            neckWidth: 0.35,     // diagonal neck waist, as a fraction of the circle radius
            gap: 0.12,           // synaptic cleft, as a fraction of cell size
            roundness: 1.0,      // convex corner radius factor (1 = full circles)
            filletDepth: 1.0,    // concave fillet radius factor (1 = full metaball cusps)
            inkColor: '#000000',
            paperColor: '#ffffff'
        };

        // allow bookmarking/sharing a specific variation via ?seed=N
        const urlSeed = parseInt(new URLSearchParams(window.location.search).get('seed'));
        if (urlSeed > 0) params.seed = urlSeed;

        let defaultParams = {...params, seed: 12345};

        // ═══════════════════════════════════════════════════════════════════════
        // ALGORITHM
        //
        // 1. Occupancy: the grid holds blob IDs (0 = empty). Distinct blobs are
        //    grown one at a time from random empty cells via seeded random
        //    walks — snaky (extend from the walk tip) or clumpy (extend from
        //    anywhere on the blob) per step — until the target density is
        //    reached. Different blobs may occupy ADJACENT cells; they stay
        //    separate objects because cells only fuse with the same blob ID.
        // 2. Form: each occupied cell is drawn as a rectangle that extends to
        //    its cell boundary on sides where the neighbor is the SAME blob
        //    (fusing into one contour) and is inset by the gap otherwise — so
        //    neighboring objects sit tangent with a thin channel between them.
        //    A corner is rounded (radius = half arm width) only when BOTH of
        //    its orthogonal neighbors are not-this-blob — isolated cells become
        //    circles, runs become capsules, bends get rounded shoulders.
        // 3. Concave fillets: where a not-this-blob cell's corner is wrapped by
        //    three same-blob neighbors (both orthogonal + the diagonal), an ink
        //    square is laid into that corner and a quarter-circle is carved out
        //    of it. Four fillets meeting in one enclosed cell crystallize into
        //    the concave "breathing hole".
        //
        // Each blob renders on its own offscreen layer (ink → fillet squares →
        // erased quarter-circle cuts) before compositing, so one blob's fillet
        // cuts can never carve into a neighboring object's ink.
        // ═══════════════════════════════════════════════════════════════════════

        const CANVAS_W = 1200;
        const MARGIN = 48;

        let grid = [];        // 0 = empty, otherwise blob id
        let blobCount = 0;
        let cellSize = 0;
        let layer = null;     // offscreen buffer, reused for every blob

        function blobAt(x, y) {
            if (x < 0 || y < 0 || x >= params.cols || y >= params.rows) return 0;
            return grid[y][x];
        }

        function emptyNeighbors(x, y) {
            const out = [];
            if (blobAt(x - 1, y) === 0 && x - 1 >= 0) out.push([x - 1, y]);
            if (blobAt(x + 1, y) === 0 && x + 1 < params.cols) out.push([x + 1, y]);
            if (blobAt(x, y - 1) === 0 && y - 1 >= 0) out.push([x, y - 1]);
            if (blobAt(x, y + 1) === 0 && y + 1 < params.rows) out.push([x, y + 1]);
            return out;
        }

        function emptyDiagonals(x, y) {
            const out = [];
            for (const [nx, ny] of [[x - 1, y - 1], [x + 1, y - 1], [x + 1, y + 1], [x - 1, y + 1]]) {
                if (nx < 0 || ny < 0 || nx >= params.cols || ny >= params.rows) continue;
                if (blobAt(nx, ny) !== 0) continue;
                // forbid a neck that would cross an existing blob's own diagonal
                // pair sitting in the two between-cells
                const b1 = blobAt(nx, y), b2 = blobAt(x, ny);
                if (b1 !== 0 && b1 === b2) continue;
                out.push([nx, ny]);
            }
            return out;
        }

        function setup() {
            let canvas = createCanvas(CANVAS_W, 800);
            canvas.parent('canvas-container');
            pixelDensity(2);
            noLoop();
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function draw() {
            // rendering is done explicitly in render(); nothing animates
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            cellSize = (CANVAS_W - 2 * MARGIN) / params.cols;
            const h = Math.round(params.rows * cellSize + 2 * MARGIN);
            if (height !== h) resizeCanvas(CANVAS_W, h);

            buildGrid();
            render();
        }

        function buildGrid() {
            grid = Array.from({length: params.rows}, () => new Array(params.cols).fill(0));
            blobCount = 0;
            const target = Math.round(params.density * params.cols * params.rows);
            let occupied = 0;

            while (occupied < target) {
                const empties = [];
                for (let y = 0; y < params.rows; y++)
                    for (let x = 0; x < params.cols; x++)
                        if (!grid[y][x]) empties.push([x, y]);
                if (!empties.length) break;

                const id = ++blobCount;
                const size = Math.min(1 + Math.floor(random(params.blobSize)), target - occupied);
                const [sx, sy] = empties[Math.floor(random(empties.length))];
                grid[sy][sx] = id;
                const cells = [[sx, sy]];

                while (cells.length < size) {
                    // grow from the walk tip (snaky) or anywhere on the blob (clumpy)
                    const base = random() < params.snakiness
                        ? cells[cells.length - 1]
                        : cells[Math.floor(random(cells.length))];
                    let opts;
                    if (random() < params.diagonal) {
                        opts = emptyDiagonals(base[0], base[1]);
                        if (!opts.length) opts = emptyNeighbors(base[0], base[1]);
                    } else {
                        opts = emptyNeighbors(base[0], base[1]);
                    }
                    if (!opts.length) {
                        opts = cells.flatMap(c => emptyNeighbors(c[0], c[1]));
                        if (!opts.length) break; // blob is fully walled in
                    }
                    const [nx, ny] = opts[Math.floor(random(opts.length))];
                    grid[ny][nx] = id;
                    cells.push([nx, ny]);
                }
                occupied += cells.length;
            }
        }

        function render() {
            const s = cellSize;
            const g = params.gap * s * 0.5;          // inset per free side; cleft between objects = 2g
            const R = params.roundness * (s / 2 - g); // convex corner radius (= half arm width at 1.0)
            const rf = params.filletDepth * (s / 2 + g); // concave fillet radius

            background(params.paperColor);

            if (!layer || layer.width !== width || layer.height !== height) {
                if (layer) layer.remove();
                layer = createGraphics(width, height);
                layer.pixelDensity(2);
            }

            for (let id = 1; id <= blobCount; id++) {
                layer.clear();
                layer.noStroke();
                layer.fill(params.inkColor);

                // Pass 1: this blob's cells as per-corner rounded rects
                for (let y = 0; y < params.rows; y++) {
                    for (let x = 0; x < params.cols; x++) {
                        if (grid[y][x] !== id) continue;
                        const L = blobAt(x - 1, y) === id, Rt = blobAt(x + 1, y) === id;
                        const T = blobAt(x, y - 1) === id, B = blobAt(x, y + 1) === id;

                        // fused sides overlap the neighbor by half a pixel to
                        // avoid antialiasing seams between abutting rects
                        const x0 = MARGIN + x * s + (L ? -0.5 : g);
                        const x1 = MARGIN + (x + 1) * s - (Rt ? -0.5 : g);
                        const y0 = MARGIN + y * s + (T ? -0.5 : g);
                        const y1 = MARGIN + (y + 1) * s - (B ? -0.5 : g);

                        const rMax = Math.min((x1 - x0) / 2, (y1 - y0) / 2);
                        const r = Math.min(R, rMax);

                        layer.rect(x0, y0, x1 - x0, y1 - y0,
                            (!T && !L) ? r : 0,   // top-left
                            (!T && !Rt) ? r : 0,  // top-right
                            (!B && !Rt) ? r : 0,  // bottom-right
                            (!B && !L) ? r : 0);  // bottom-left
                    }
                }

                // Pass 1.5: skinny necks between same-blob cells that touch only
                // diagonally — the classic two-tangent-circle metaball pinch
                for (let y = 0; y < params.rows; y++) {
                    for (let x = 0; x < params.cols; x++) {
                        if (grid[y][x] !== id) continue;
                        // check the two forward diagonals so each pair draws once
                        for (const dy of [1, -1]) {
                            const dxc = x + 1, dyc = y + dy;
                            if (blobAt(dxc, dyc) !== id) continue;
                            const b1 = blobAt(x + 1, y), b2 = blobAt(x, y + dy);
                            if (b1 === id || b2 === id) continue;       // fused via L-bend already
                            if (b1 !== 0 && b1 === b2) continue;        // would cross another blob's neck
                            drawNeck(
                                MARGIN + (x + 0.5) * s, MARGIN + (y + 0.5) * s,
                                MARGIN + (dxc + 0.5) * s, MARGIN + (dyc + 0.5) * s,
                                s / 2 - g, params.neckWidth * (s / 2 - g)
                            );
                        }
                    }
                }

                // Pass 2: concave fillets where a not-this-blob cell's corner is
                // wrapped by three same-blob neighbors (both orthogonal + diagonal)
                if (rf > 0) {
                    const squares = [];
                    const cuts = [];
                    for (let y = 0; y < params.rows; y++) {
                        for (let x = 0; x < params.cols; x++) {
                            if (grid[y][x] === id) continue;
                            const corners = [
                                // [orthoA, orthoB, diagonal, corner point Px/Py, inward direction dx/dy]
                                [blobAt(x - 1, y), blobAt(x, y - 1), blobAt(x - 1, y - 1), MARGIN + x * s - g,       MARGIN + y * s - g,        1,  1],
                                [blobAt(x + 1, y), blobAt(x, y - 1), blobAt(x + 1, y - 1), MARGIN + (x + 1) * s + g, MARGIN + y * s - g,       -1,  1],
                                [blobAt(x + 1, y), blobAt(x, y + 1), blobAt(x + 1, y + 1), MARGIN + (x + 1) * s + g, MARGIN + (y + 1) * s + g, -1, -1],
                                [blobAt(x - 1, y), blobAt(x, y + 1), blobAt(x - 1, y + 1), MARGIN + x * s - g,       MARGIN + (y + 1) * s + g,  1, -1]
                            ];
                            for (const [a, b, d, px, py, dx, dy] of corners) {
                                if (a === id && b === id && d === id) {
                                    squares.push([dx > 0 ? px : px - rf, dy > 0 ? py : py - rf]);
                                    cuts.push([px + dx * rf, py + dy * rf]);
                                }
                            }
                        }
                    }

                    // ink squares first, then erased cuts — overlapping cuts are
                    // what form the cusps and breathing holes
                    for (const [qx, qy] of squares) layer.rect(qx, qy, rf, rf);
                    layer.erase();
                    for (const [cx, cy] of cuts) layer.circle(cx, cy, rf * 2);
                    layer.noErase();
                }

                image(layer, 0, 0, width, height);
            }
        }

        // Draw a metaball neck fusing two circles (radius r, centers p1/p2)
        // with waist half-width n: an ink quad between the tangent chords, then
        // two side "fillet circles" (externally tangent to both main circles)
        // erased out of it. The erase is clipped to the quad so the large fillet
        // circles cannot nick any other ink on the layer.
        function drawNeck(p1x, p1y, p2x, p2y, r, n) {
            n = Math.min(n, r * 0.9);
            const d = Math.hypot(p2x - p1x, p2y - p1y);
            const ux = (p2x - p1x) / d, uy = (p2y - p1y) / d; // axis
            const vx = -uy, vy = ux;                          // perpendicular
            // fillet radius that produces the requested waist
            const q = (d * d / 4 + n * n - r * r) / (2 * (r - n));
            if (q <= 0) return; // circles already overlap
            const h = n + q;    // fillet center height above the midpoint
            const mx = (p1x + p2x) / 2, my = (p1y + p2y) / 2;

            const pts = [];   // quad corners: T1+, T2+, T2-, T1-
            const fills = []; // fillet circle centers
            for (const sgn of [1, -1]) {
                const fx = mx + vx * h * sgn, fy = my + vy * h * sgn;
                fills.push([fx, fy]);
                const t = r / (r + q); // tangent point = lerp(P, F, r/(r+q))
                const t1 = [p1x + (fx - p1x) * t, p1y + (fy - p1y) * t];
                const t2 = [p2x + (fx - p2x) * t, p2y + (fy - p2y) * t];
                if (sgn === 1) pts.push(t1, t2); else pts.push(t2, t1);
            }

            layer.fill(params.inkColor);
            layer.quad(pts[0][0], pts[0][1], pts[1][0], pts[1][1],
                       pts[2][0], pts[2][1], pts[3][0], pts[3][1]);

            const ctx = layer.drawingContext;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(pts[0][0], pts[0][1]);
            for (let i = 1; i < 4; i++) ctx.lineTo(pts[i][0], pts[i][1]);
            ctx.closePath();
            ctx.clip();
            layer.erase();
            for (const [fx, fy] of fills) layer.circle(fx, fy, q * 2);
            layer.noErase();
            ctx.restore();
            layer.fill(params.inkColor); // erase() clobbers fill state
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI CONTROL HANDLERS
        // ═══════════════════════════════════════════════════════════════════════

        const intParams = ['cols', 'rows', 'seed', 'blobSize'];

        function updateParam(name, value) {
            const v = intParams.includes(name) ? parseInt(value) : parseFloat(value);
            params[name] = v;
            document.getElementById(name + '-value').textContent =
                intParams.includes(name) ? v : v.toFixed(2);
            initializeSystem();
        }

        function updateColor(name, value) {
            params[name] = value;
            document.getElementById(name + '-value').textContent = value;
            render();
        }

        function swapColors() {
            const ink = params.inkColor;
            params.inkColor = params.paperColor;
            params.paperColor = ink;
            syncColorUI();
            render();
        }

        function syncColorUI() {
            for (const name of ['inkColor', 'paperColor']) {
                document.getElementById(name).value = params[name];
                document.getElementById(name + '-value').textContent = params[name];
            }
        }

        function downloadPNG() {
            saveCanvas('generative-brain-seed-' + params.seed, 'png');
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SEED CONTROL FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams};

            for (const name of ['cols', 'rows', 'density', 'blobSize', 'snakiness', 'diagonal', 'neckWidth', 'gap', 'roundness', 'filletDepth']) {
                document.getElementById(name).value = params[name];
                document.getElementById(name + '-value').textContent =
                    intParams.includes(name) ? params[name] : params[name].toFixed(2);
            }
            syncColorUI();
            updateSeedDisplay();
            initializeSystem();
        }

        // Initialize UI on load
        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
